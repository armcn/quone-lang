<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Quone — A typed functional language that compiles to R</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Quone is a statically typed functional language that compiles to idiomatic R. Hindley-Milner type inference, algebraic data types, dplyr built into the language, and readable .R output.">

    <link rel="canonical" href="https://quone-lang.org/">

    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Quone">
    <meta property="og:url" content="https://quone-lang.org/">
    <meta property="og:title" content="Quone — A typed functional language that compiles to R">
    <meta property="og:description" content="Type-safe R, from the ground up. Hindley-Milner type inference, algebraic data types, dplyr built into the language, and readable .R output.">

    <meta name="twitter:card" content="summary">
    <meta name="twitter:url" content="https://quone-lang.org/">
    <meta name="twitter:title" content="Quone — A typed functional language that compiles to R">
    <meta name="twitter:description" content="Type-safe R, from the ground up. Hindley-Milner type inference, algebraic data types, dplyr built into the language, and readable .R output.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double&family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='12' fill='%23ffffff'/><ellipse cx='32' cy='34' rx='26' ry='18' fill='%23ededed'/><text x='50%25' y='64%25' font-family='monospace' font-size='44' font-weight='700' fill='%23276dc3' text-anchor='middle' dominant-baseline='middle'>Q</text></svg>">

    <style>
        :root {
            /* Palette inspired by r-project.org. Clean white canvas, R-logo
               blue as the primary accent, and a warm coral as the secondary
               accent — together a classic split-complementary pairing used
               in scientific data viz (think the RdBu diverging palette). */
            --cream:       #ffffff;
            --paper:       #fafaf9;
            --ink:         #1a1a1a;
            --ink-soft:    #4a4a4a;
            --muted:       #8a8a8a;
            --line:        #e5e5e3;

            --blue:        #276dc3;
            --blue-dark:   #1a4f8b;
            --blue-light:  #7eb6ff;
            --blue-soft:   #e8f0f9;

            --coral:       #e0604c;
            --coral-dark:  #b03a28;
            --coral-light: #ff8b7a;
            --coral-soft:  #fde4dd;

            --silver:      #b5b5b5;
            --silver-soft: #ededed;
            --teal:        #0d9488;

            --code-bg:     #161616;
            --code-text:   #e6e6e3;

            /* Syntax tokens — dark Quone panel.
               Anchored on lighter brand colors (coral + blue), supporting
               cool teal and warm cream so the palette reads as one family. */
            --tok-comment-d: #6b7280;
            --tok-keyword-d: #ff8b7a;
            --tok-type-d:    #5eead4;
            --tok-string-d:  #f5d28a;
            --tok-num-d:     #c4a3ff;
            --tok-op-d:      #ff8b7a;
            --tok-fn-d:      #7eb6ff;

            /* Syntax tokens — light R panel.
               Same color identity as the dark theme (blue is blue, coral is
               coral) but at darker, AA-legible saturations on white. */
            --tok-comment-l: #8a8a8a;
            --tok-keyword-l: #b03a28;
            --tok-type-l:    #0d9488;
            --tok-string-l:  #a16207;
            --tok-num-l:     #6d28d9;
            --tok-op-l:      #b03a28;
            --tok-fn-l:      #1a4f8b;

            --font-display: 'Space Grotesk', 'Inter', system-ui, sans-serif;
            --font-body:    'Inter', system-ui, -apple-system, sans-serif;
            --font-mono:    'JetBrains Mono', 'SF Mono', Menlo, monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html { scroll-behavior: smooth; }

        body {
            font-family: var(--font-body);
            font-size: 16px;
            line-height: 1.6;
            color: var(--ink);
            background: var(--cream);
            -webkit-font-smoothing: antialiased;
            background-image:
                radial-gradient(1000px circle at 10% -10%, rgba(39, 109, 195, 0.06), transparent 40%),
                radial-gradient(900px circle at 110% 10%, rgba(224, 96, 76, 0.04), transparent 45%);
            background-attachment: fixed;
            min-height: 100vh;
        }

        a { color: inherit; text-decoration: none; }

        .display { font-family: var(--font-display); font-weight: 700; letter-spacing: -0.02em; }
        .mono { font-family: var(--font-mono); }

        .container { max-width: 1120px; margin: 0 auto; padding: 0 28px; }
        .narrow { max-width: 780px; margin: 0 auto; padding: 0 28px; }

        /* ---------- Nav ---------- */
        .nav {
            position: sticky;
            top: 0;
            z-index: 20;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.85);
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s ease;
        }
        .nav.scrolled { border-color: var(--line); }
        .nav-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 68px;
        }
        .logo {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 22px;
            letter-spacing: -0.02em;
            color: var(--ink);
            display: inline-flex;
            align-items: baseline;
            gap: 8px;
            line-height: 1;
        }
        .logo-mark {
            font-family: 'Bitcount Grid Double', 'JetBrains Mono', monospace;
            font-weight: 400;
            font-size: 40px;
            line-height: 0.85;
            color: var(--blue);
            font-feature-settings: normal;
            letter-spacing: 0;
            display: inline-block;
            transform: translateY(2px);
        }
        .nav-links {
            display: flex;
            align-items: center;
            gap: 32px;
            font-size: 14px;
            font-weight: 500;
        }
        .nav-links a {
            color: var(--ink-soft);
            transition: color 0.15s ease;
        }
        .nav-links a:hover { color: var(--blue); }
        .nav-links a.github {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border: 1px solid var(--ink);
            border-radius: 999px;
            color: var(--ink);
        }
        .nav-links a.github:hover {
            background: var(--ink);
            color: var(--cream);
        }
        @media (max-width: 700px) {
            .nav-links { gap: 16px; font-size: 13px; }
            .nav-links .hide-mobile { display: none; }
        }

        /* ---------- Hero ---------- */
        .hero {
            padding: 88px 0 72px;
            position: relative;
        }
        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--blue);
            margin-bottom: 24px;
        }
        .eyebrow::before {
            content: '';
            width: 22px;
            height: 1px;
            background: var(--blue);
        }
        h1.hero-title {
            font-family: var(--font-display);
            font-size: clamp(40px, 6vw, 72px);
            font-weight: 700;
            line-height: 1.05;
            letter-spacing: -0.03em;
            color: var(--ink);
            max-width: 20ch;
            margin-bottom: 24px;
        }
        h1.hero-title .accent { color: var(--blue); }
        h1.hero-title .underline {
            background-image: linear-gradient(transparent 68%, rgba(224, 96, 76, 0.45) 68%, rgba(224, 96, 76, 0.45) 92%, transparent 92%);
            padding: 0 4px;
        }
        .hero-sub {
            font-size: 19px;
            line-height: 1.55;
            color: var(--ink-soft);
            max-width: 60ch;
            margin-bottom: 36px;
        }
        .hero-cta {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            margin-bottom: 64px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 13px 24px;
            border-radius: 999px;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.15s ease;
            border: 1px solid transparent;
            cursor: pointer;
            font-family: var(--font-body);
        }
        .btn-primary {
            background: var(--ink);
            color: var(--cream);
        }
        .btn-primary:hover {
            background: var(--blue);
            transform: translateY(-1px);
        }
        .btn-ghost {
            border-color: var(--line);
            color: var(--ink);
            background: transparent;
        }
        .btn-ghost:hover {
            border-color: var(--ink);
            background: var(--paper);
        }

        /* ---------- Hero code card ---------- */
        .code-wrap {
            position: relative;
        }
        .code-wrap::before {
            content: '';
            position: absolute;
            inset: 16px -12px -16px 12px;
            background: linear-gradient(135deg, var(--coral), var(--coral-dark));
            border-radius: 14px;
            transform: rotate(-0.6deg);
            opacity: 0.85;
            z-index: 0;
        }
        .code-card {
            position: relative;
            background: var(--code-bg);
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 20px 60px -20px rgba(0, 0, 0, 0.4);
            z-index: 1;
        }
        .code-tabs {
            display: flex;
            gap: 2px;
            padding: 10px 10px 0 10px;
            background: #0f0f0f;
            border-bottom: 1px solid rgba(232, 232, 230, 0.08);
            align-items: center;
            justify-content: space-between;
        }
        .code-tabs-left { display: flex; gap: 2px; }
        .code-tab {
            appearance: none;
            background: transparent;
            border: 0;
            color: rgba(232, 232, 230, 0.55);
            font-family: var(--font-mono);
            font-size: 12.5px;
            font-weight: 500;
            padding: 10px 14px;
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .code-tab:hover { color: var(--cream); }
        .code-tab.active {
            color: var(--cream);
            background: var(--code-bg);
        }
        .output-toggle {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-right: 8px;
            font-size: 12px;
            font-weight: 500;
            color: rgba(232, 232, 230, 0.7);
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 999px;
            background: rgba(232, 232, 230, 0.08);
            border: 0;
            font-family: var(--font-body);
            transition: all 0.15s ease;
        }
        .output-toggle:hover { background: rgba(232, 232, 230, 0.14); color: var(--cream); }
        .output-toggle.on {
            background: var(--coral);
            color: #1a1423;
        }
        .output-toggle .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--coral);
        }
        .output-toggle.on .dot { background: #1a1423; }

        .code-body {
            padding: 24px 28px;
            font-family: var(--font-mono);
            font-size: 13.5px;
            line-height: 1.75;
            color: var(--code-text);
            overflow-x: auto;
            min-height: 280px;
        }
        .code-line { display: block; white-space: pre; min-height: 1.75em; }

        /* Default token palette = dark theme (Quone panel). */
        .tok-comment { color: var(--tok-comment-d); font-style: italic; }
        .tok-keyword { color: var(--tok-keyword-d); font-weight: 500; }
        .tok-type    { color: var(--tok-type-d); }
        .tok-string  { color: var(--tok-string-d); }
        .tok-num     { color: var(--tok-num-d); }
        .tok-op      { color: var(--tok-op-d); }
        .tok-fn      { color: var(--tok-fn-d); }

        /* Light overrides for the R panel — same color identity, darker
           saturations so each token stays legible on the paper background. */
        .pane.r .tok-comment { color: var(--tok-comment-l); }
        .pane.r .tok-keyword { color: var(--tok-keyword-l); font-weight: 600; }
        .pane.r .tok-type    { color: var(--tok-type-l); }
        .pane.r .tok-string  { color: var(--tok-string-l); }
        .pane.r .tok-num     { color: var(--tok-num-l); }
        .pane.r .tok-op      { color: var(--tok-op-l); }
        .pane.r .tok-fn      { color: var(--tok-fn-l); }

        /* ---------- Sections ---------- */
        .section {
            padding: 88px 0;
            border-top: 1px solid var(--line);
        }
        .section-eyebrow {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--coral);
            margin-bottom: 14px;
        }
        .section-title {
            font-family: var(--font-display);
            font-size: clamp(28px, 3.6vw, 44px);
            font-weight: 700;
            line-height: 1.1;
            letter-spacing: -0.02em;
            max-width: 24ch;
            margin-bottom: 18px;
            color: var(--ink);
        }
        .section-title .accent { color: var(--blue); }
        .section-lede {
            font-size: 17px;
            color: var(--ink-soft);
            max-width: 62ch;
            margin-bottom: 48px;
        }

        /* ---------- Feature grid ---------- */
        .features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        @media (max-width: 900px) { .features { grid-template-columns: 1fr; gap: 16px; } }
        .feature {
            padding: 28px 26px;
            background: var(--paper);
            border: 1px solid var(--line);
            border-radius: 14px;
            transition: all 0.2s ease;
        }
        .feature:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px -12px rgba(0, 0, 0, 0.12);
            border-color: var(--blue-soft);
        }
        .feature-icon {
            width: 42px;
            height: 42px;
            border-radius: 11px;
            background: var(--blue-soft);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 20px;
            color: var(--blue);
            margin-bottom: 18px;
        }
        .feature h3 {
            font-family: var(--font-display);
            font-size: 19px;
            font-weight: 700;
            letter-spacing: -0.01em;
            margin-bottom: 8px;
        }
        .feature p { color: var(--ink-soft); font-size: 14.5px; line-height: 1.6; }

        /* ---------- Interactive compiler explorer ---------- */
        .explorer-wrap { margin-top: 8px; }
        .explorer-controls {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px 18px;
            margin-bottom: 24px;
        }
        .explorer-tabs {
            display: inline-flex;
            gap: 4px;
            padding: 5px;
            background: var(--paper);
            border: 1px solid var(--line);
            border-radius: 999px;
        }
        .explorer-tab {
            appearance: none;
            border: 0;
            background: transparent;
            padding: 8px 18px;
            font-family: var(--font-body);
            font-size: 13.5px;
            font-weight: 500;
            color: var(--ink-soft);
            border-radius: 999px;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .explorer-tab:hover { color: var(--blue); }
        .explorer-tab.active {
            background: var(--blue);
            color: var(--cream);
            font-weight: 600;
        }
        .explorer-hint {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--muted);
        }
        .explorer-hint .pulse {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--coral);
            box-shadow: 0 0 0 0 rgba(224, 96, 76, 0.6);
            animation: pulse 1.8s infinite;
        }
        @keyframes pulse {
            0%   { box-shadow: 0 0 0 0 rgba(224, 96, 76, 0.55); }
            70%  { box-shadow: 0 0 0 10px rgba(224, 96, 76, 0); }
            100% { box-shadow: 0 0 0 0 rgba(224, 96, 76, 0); }
        }

        .explorer {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            align-items: start;
        }
        @media (max-width: 900px) { .explorer { grid-template-columns: 1fr; } }

        .pane {
            border: 1px solid var(--line);
            border-radius: 14px;
            overflow: hidden;
            background: var(--paper);
        }
        .pane-head {
            padding: 12px 18px;
            font-family: var(--font-mono);
            font-size: 12.5px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--line);
            letter-spacing: 0.02em;
        }
        .pane.quone .pane-head {
            background: var(--code-bg);
            color: var(--cream);
            border-bottom-color: transparent;
        }
        .pane.r .pane-head {
            background: var(--cream);
            color: var(--ink-soft);
        }
        .pane-head .badge {
            font-family: var(--font-body);
            font-size: 10.5px;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 999px;
            text-transform: uppercase;
            letter-spacing: 0.09em;
        }
        .pane.quone .badge { background: var(--blue); color: var(--cream); }
        .pane.r .badge { background: #dbeafe; color: #1e40af; }

        .pane-body {
            font-family: var(--font-mono);
            font-size: 13px;
            line-height: 1.7;
        }
        .pane.quone .pane-body { background: var(--code-bg); color: var(--code-text); }
        .pane.r .pane-body { background: var(--paper); color: var(--ink); }

        .chunk {
            padding: 10px 18px;
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: background 0.15s ease, border-color 0.15s ease;
            position: relative;
        }
        .chunk:not(:last-child) {
            /* subtle inner rule */
        }
        .pane.quone .chunk:hover { background: rgba(39, 109, 195, 0.14); }
        .pane.r .chunk:hover { background: rgba(39, 109, 195, 0.06); }
        .chunk.active {
            border-left-color: var(--blue);
        }
        .pane.quone .chunk.active { background: rgba(39, 109, 195, 0.22); }
        .pane.r .chunk.active { background: rgba(224, 96, 76, 0.12); border-left-color: var(--coral); }
        .chunk.dimmed { opacity: 0.35; transition: opacity 0.15s ease; }
        .chunk:hover.dimmed { opacity: 1; }

        .chunk-line { display: block; white-space: pre; min-height: 1.7em; }

        .explanation {
            margin-top: 20px;
            padding: 22px 26px;
            background: var(--blue-soft);
            border: 1px solid rgba(39, 109, 195, 0.15);
            border-radius: 14px;
            display: flex;
            gap: 18px;
            align-items: flex-start;
        }
        .explanation-tag {
            flex: 0 0 auto;
            padding: 4px 10px;
            background: var(--blue);
            color: var(--cream);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            border-radius: 999px;
            font-family: var(--font-body);
        }
        .explanation-body {
            color: var(--ink);
            font-size: 15px;
            line-height: 1.6;
        }
        .explanation-body code {
            font-family: var(--font-mono);
            font-size: 13px;
            padding: 2px 6px;
            background: var(--paper);
            border: 1px solid rgba(39, 109, 195, 0.2);
            border-radius: 5px;
        }

        /* ---------- Install ---------- */
        .install {
            background: var(--ink);
            color: var(--cream);
            border-radius: 20px;
            padding: 64px 56px;
            position: relative;
            overflow: hidden;
        }
        .install::before {
            content: '';
            position: absolute;
            top: -100px;
            right: -100px;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--blue) 0%, transparent 65%);
            opacity: 0.4;
        }
        @media (max-width: 700px) { .install { padding: 44px 26px; } }
        .install-inner { position: relative; z-index: 1; max-width: 720px; }
        .install .section-eyebrow { color: var(--coral); }
        .install h2 {
            font-family: var(--font-display);
            font-size: clamp(26px, 3.4vw, 38px);
            font-weight: 700;
            line-height: 1.1;
            letter-spacing: -0.02em;
            margin-bottom: 14px;
        }
        .install h2 .accent { color: var(--coral); }
        .install p { color: rgba(232, 232, 230, 0.72); margin-bottom: 26px; max-width: 54ch; font-size: 16px; }
        .terminal {
            background: #0a0612;
            border: 1px solid rgba(232, 232, 230, 0.12);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 18px;
        }
        .terminal-head {
            padding: 10px 14px;
            border-bottom: 1px solid rgba(232, 232, 230, 0.08);
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .terminal-head .dot {
            width: 11px;
            height: 11px;
            border-radius: 50%;
            background: rgba(232, 232, 230, 0.15);
        }
        .terminal-body {
            padding: 16px 22px;
            font-family: var(--font-mono);
            font-size: 13.5px;
            line-height: 1.8;
        }
        .terminal-body .prompt { color: var(--blue); user-select: none; margin-right: 10px; }
        .terminal-body .cmd { color: var(--cream); }
        .terminal-body .out { color: rgba(232, 232, 230, 0.55); display: block; }

        /* ---------- Comparison table ---------- */
        .compare-section .section-lede { max-width: 64ch; }
        .compare-table-wrap {
            background: var(--paper);
            border: 1px solid var(--line);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 6px 24px -10px rgba(0, 0, 0, 0.06);
        }
        .compare-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        .compare-table thead th {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
            padding: 18px 20px;
            text-align: left;
            border-bottom: 1px solid var(--line);
        }
        .compare-table thead th.col-quone {
            color: var(--blue);
            background: var(--blue-soft);
        }
        .compare-table tbody th {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 14px;
            color: var(--ink);
            padding: 16px 20px;
            text-align: left;
            border-bottom: 1px solid var(--line);
            white-space: nowrap;
        }
        .compare-table tbody td {
            padding: 16px 20px;
            color: var(--ink-soft);
            border-bottom: 1px solid var(--line);
            font-family: var(--font-mono);
            font-size: 13px;
        }
        .compare-table tbody td.col-quone {
            background: var(--blue-soft);
            color: var(--blue-dark);
            font-weight: 600;
        }
        .compare-table tbody tr:last-child th,
        .compare-table tbody tr:last-child td { border-bottom: 0; }
        .compare-good { color: var(--blue-dark); font-weight: 600; }
        @media (max-width: 700px) {
            .compare-table thead th,
            .compare-table tbody th,
            .compare-table tbody td { padding: 12px 12px; font-size: 12.5px; }
        }

        /* ---------- Quote ---------- */
        .quote {
            font-family: var(--font-display);
            font-weight: 500;
            font-size: 19px;
            color: var(--ink);
            line-height: 1.5;
            padding: 22px 26px;
            border-left: 3px solid var(--coral);
            background: var(--coral-soft);
            border-radius: 0 10px 10px 0;
            margin: 24px 0 8px;
        }
        .quote cite {
            display: block;
            margin-top: 10px;
            font-family: var(--font-body);
            font-size: 13px;
            font-style: normal;
            font-weight: 500;
            color: var(--muted);
        }

        /* ---------- Footer ---------- */
        footer {
            border-top: 1px solid var(--line);
            padding: 64px 0 40px;
            margin-top: 32px;
        }
        .footer-grid {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            gap: 44px;
            margin-bottom: 48px;
        }
        @media (max-width: 800px) { .footer-grid { grid-template-columns: 1fr 1fr; gap: 36px; } }
        .footer-about p {
            color: var(--ink-soft);
            margin-top: 14px;
            font-size: 14.5px;
            max-width: 40ch;
        }
        .footer-col h4 {
            font-family: var(--font-display);
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--ink);
            margin-bottom: 16px;
        }
        .footer-col ul { list-style: none; display: flex; flex-direction: column; gap: 9px; }
        .footer-col a {
            color: var(--ink-soft);
            font-size: 14.5px;
            transition: color 0.15s ease;
        }
        .footer-col a:hover { color: var(--blue); }
        .footer-col a.placeholder {
            color: var(--muted);
            cursor: help;
        }
        .footer-col a.placeholder::after {
            content: ' · soon';
            font-size: 10.5px;
            color: var(--coral);
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }
        .footer-bottom {
            padding-top: 28px;
            border-top: 1px solid var(--line);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 14px;
            font-size: 12.5px;
            color: var(--muted);
        }
        .footer-bottom a { color: var(--ink-soft); border-bottom: 1px solid transparent; }
        .footer-bottom a:hover { border-bottom-color: var(--blue); }

        /* ---------- Misc accents ---------- */
        .pill {
            display: inline-block;
            padding: 3px 10px;
            background: var(--blue-soft);
            color: var(--blue-dark);
            border-radius: 999px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.05em;
        }
        .arrow { display: inline-block; transition: transform 0.15s ease; }
        a:hover .arrow { transform: translateX(3px); }

        noscript {
            display: block;
            padding: 20px;
            background: var(--blue-soft);
            color: var(--blue-dark);
            text-align: center;
        }
    </style>
</head>
<body>
    <noscript>This page is built with Elm and requires JavaScript to render.</noscript>
    <div id="app"></div>

    <script src="main.js"></script>
    <script>
        var app = Elm.Main.init({ node: document.getElementById('app') });

        var nav = null;
        function onScroll() {
            if (!nav) nav = document.querySelector('.nav');
            if (!nav) return;
            if (window.scrollY > 8) nav.classList.add('scrolled');
            else nav.classList.remove('scrolled');
        }
        window.addEventListener('scroll', onScroll, { passive: true });
        requestAnimationFrame(onScroll);
    </script>
</body>
</html>
