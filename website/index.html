<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Quone — A typed functional language that compiles to R</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Quone is a statically typed functional language that compiles to idiomatic R. Hindley-Milner type inference, algebraic data types, dplyr built into the language, and readable .R output.">
    <meta name="theme-color" content="#1a1423">

    <link rel="canonical" href="https://quone-lang.org/">

    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Quone">
    <meta property="og:url" content="https://quone-lang.org/">
    <meta property="og:title" content="Quone — A typed functional language that compiles to R">
    <meta property="og:description" content="Type-safe R, from the ground up. Hindley-Milner type inference, algebraic data types, dplyr built into the language, and readable .R output.">

    <meta name="twitter:card" content="summary">
    <meta name="twitter:url" content="https://quone-lang.org/">
    <meta name="twitter:title" content="Quone — A typed functional language that compiles to R">
    <meta name="twitter:description" content="Type-safe R, from the ground up. Hindley-Milner type inference, algebraic data types, dplyr built into the language, and readable .R output.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='16' fill='%236d28d9'/><text x='50%25' y='60%25' font-family='Space Grotesk,sans-serif' font-size='38' font-weight='700' fill='%23fbf8f2' text-anchor='middle'>q</text></svg>">

    <style>
        :root {
            --cream: #fbf8f2;
            --paper: #ffffff;
            --ink: #1a1423;
            --ink-soft: #4a3f5a;
            --muted: #8b7f98;
            --line: #e8e1d6;
            --violet: #6d28d9;
            --violet-dark: #4c1d95;
            --violet-soft: #ede9fe;
            --amber: #f59e0b;
            --amber-soft: #fef3c7;
            --coral: #f97066;
            --teal: #14b8a6;
            --code-bg: #1a1423;
            --code-text: #e8e1d6;

            --font-display: 'Space Grotesk', 'Inter', system-ui, sans-serif;
            --font-body: 'Inter', system-ui, -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html { scroll-behavior: smooth; }

        body {
            font-family: var(--font-body);
            font-size: 16px;
            line-height: 1.6;
            color: var(--ink);
            background: var(--cream);
            -webkit-font-smoothing: antialiased;
            background-image:
                radial-gradient(1000px circle at 10% -10%, rgba(109, 40, 217, 0.06), transparent 40%),
                radial-gradient(900px circle at 110% 10%, rgba(245, 158, 11, 0.05), transparent 45%);
            background-attachment: fixed;
            min-height: 100vh;
        }

        a { color: inherit; text-decoration: none; }

        .display { font-family: var(--font-display); font-weight: 700; letter-spacing: -0.02em; }
        .mono { font-family: var(--font-mono); }

        .container { max-width: 1120px; margin: 0 auto; padding: 0 28px; }
        .narrow { max-width: 780px; margin: 0 auto; padding: 0 28px; }

        /* ---------- Nav ---------- */
        .nav {
            position: sticky;
            top: 0;
            z-index: 20;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            background: rgba(251, 248, 242, 0.85);
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s ease;
        }
        .nav.scrolled { border-color: var(--line); }
        .nav-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 68px;
        }
        .logo {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 22px;
            letter-spacing: -0.02em;
            color: var(--ink);
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .logo-mark {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 9px;
            background: var(--violet);
            color: var(--cream);
            font-weight: 700;
            font-size: 18px;
            transform: rotate(-4deg);
            box-shadow: 2px 2px 0 var(--amber);
        }
        .nav-links {
            display: flex;
            align-items: center;
            gap: 32px;
            font-size: 14px;
            font-weight: 500;
        }
        .nav-links a {
            color: var(--ink-soft);
            transition: color 0.15s ease;
        }
        .nav-links a:hover { color: var(--violet); }
        .nav-links a.github {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border: 1px solid var(--ink);
            border-radius: 999px;
            color: var(--ink);
        }
        .nav-links a.github:hover {
            background: var(--ink);
            color: var(--cream);
        }
        @media (max-width: 700px) {
            .nav-links { gap: 16px; font-size: 13px; }
            .nav-links .hide-mobile { display: none; }
        }

        /* ---------- Hero ---------- */
        .hero {
            padding: 88px 0 72px;
            position: relative;
        }
        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--violet);
            margin-bottom: 24px;
        }
        .eyebrow::before {
            content: '';
            width: 22px;
            height: 1px;
            background: var(--violet);
        }
        h1.hero-title {
            font-family: var(--font-display);
            font-size: clamp(40px, 6vw, 72px);
            font-weight: 700;
            line-height: 1.05;
            letter-spacing: -0.03em;
            color: var(--ink);
            max-width: 20ch;
            margin-bottom: 24px;
        }
        h1.hero-title .accent { color: var(--violet); }
        h1.hero-title .underline {
            background-image: linear-gradient(transparent 68%, rgba(245, 158, 11, 0.35) 68%, rgba(245, 158, 11, 0.35) 92%, transparent 92%);
            padding: 0 4px;
        }
        .hero-sub {
            font-size: 19px;
            line-height: 1.55;
            color: var(--ink-soft);
            max-width: 60ch;
            margin-bottom: 36px;
        }
        .hero-cta {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            margin-bottom: 64px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 13px 24px;
            border-radius: 999px;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.15s ease;
            border: 1px solid transparent;
            cursor: pointer;
            font-family: var(--font-body);
        }
        .btn-primary {
            background: var(--ink);
            color: var(--cream);
        }
        .btn-primary:hover {
            background: var(--violet);
            transform: translateY(-1px);
        }
        .btn-ghost {
            border-color: var(--line);
            color: var(--ink);
            background: transparent;
        }
        .btn-ghost:hover {
            border-color: var(--ink);
            background: var(--paper);
        }

        /* ---------- Hero code card ---------- */
        .code-wrap {
            position: relative;
        }
        .code-wrap::before {
            content: '';
            position: absolute;
            inset: 16px -12px -16px 12px;
            background: linear-gradient(135deg, var(--amber), var(--coral));
            border-radius: 14px;
            transform: rotate(-0.6deg);
            opacity: 0.85;
            z-index: 0;
        }
        .code-card {
            position: relative;
            background: var(--code-bg);
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 20px 60px -20px rgba(26, 20, 35, 0.4);
            z-index: 1;
        }
        .code-tabs {
            display: flex;
            gap: 2px;
            padding: 10px 10px 0 10px;
            background: #120c1d;
            border-bottom: 1px solid rgba(232, 225, 214, 0.08);
            align-items: center;
            justify-content: space-between;
        }
        .code-tabs-left { display: flex; gap: 2px; }
        .code-tab {
            appearance: none;
            background: transparent;
            border: 0;
            color: rgba(232, 225, 214, 0.55);
            font-family: var(--font-mono);
            font-size: 12.5px;
            font-weight: 500;
            padding: 10px 14px;
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .code-tab:hover { color: var(--cream); }
        .code-tab.active {
            color: var(--cream);
            background: var(--code-bg);
        }
        .output-toggle {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-right: 8px;
            font-size: 12px;
            font-weight: 500;
            color: rgba(232, 225, 214, 0.7);
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 999px;
            background: rgba(232, 225, 214, 0.08);
            border: 0;
            font-family: var(--font-body);
            transition: all 0.15s ease;
        }
        .output-toggle:hover { background: rgba(232, 225, 214, 0.14); color: var(--cream); }
        .output-toggle.on {
            background: var(--amber);
            color: #1a1423;
        }
        .output-toggle .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--amber);
        }
        .output-toggle.on .dot { background: #1a1423; }

        .code-body {
            padding: 24px 28px;
            font-family: var(--font-mono);
            font-size: 13.5px;
            line-height: 1.75;
            color: var(--code-text);
            overflow-x: auto;
            min-height: 280px;
        }
        .code-line { display: block; white-space: pre; min-height: 1.75em; }
        .tok-comment { color: #7a6b89; font-style: italic; }
        .tok-keyword { color: #c4b5fd; font-weight: 500; }
        .tok-type    { color: #5eead4; }
        .tok-string  { color: #fcd34d; }
        .tok-num     { color: #fb923c; }
        .tok-op      { color: #f472b6; }
        .tok-fn      { color: #93c5fd; }

        /* ---------- Sections ---------- */
        .section {
            padding: 88px 0;
            border-top: 1px solid var(--line);
        }
        .section-eyebrow {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--amber);
            margin-bottom: 14px;
        }
        .section-title {
            font-family: var(--font-display);
            font-size: clamp(28px, 3.6vw, 44px);
            font-weight: 700;
            line-height: 1.1;
            letter-spacing: -0.02em;
            max-width: 24ch;
            margin-bottom: 18px;
            color: var(--ink);
        }
        .section-title .accent { color: var(--violet); }
        .section-lede {
            font-size: 17px;
            color: var(--ink-soft);
            max-width: 62ch;
            margin-bottom: 48px;
        }

        /* ---------- Feature grid ---------- */
        .features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        @media (max-width: 900px) { .features { grid-template-columns: 1fr; gap: 16px; } }
        .feature {
            padding: 28px 26px;
            background: var(--paper);
            border: 1px solid var(--line);
            border-radius: 14px;
            transition: all 0.2s ease;
        }
        .feature:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px -12px rgba(26, 20, 35, 0.12);
            border-color: var(--violet-soft);
        }
        .feature-icon {
            width: 42px;
            height: 42px;
            border-radius: 11px;
            background: var(--violet-soft);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 20px;
            color: var(--violet);
            margin-bottom: 18px;
        }
        .feature h3 {
            font-family: var(--font-display);
            font-size: 19px;
            font-weight: 700;
            letter-spacing: -0.01em;
            margin-bottom: 8px;
        }
        .feature p { color: var(--ink-soft); font-size: 14.5px; line-height: 1.6; }

        /* ---------- Interactive compiler explorer ---------- */
        .explorer-wrap { margin-top: 8px; }
        .explorer-controls {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px 18px;
            margin-bottom: 24px;
        }
        .explorer-tabs {
            display: inline-flex;
            gap: 4px;
            padding: 5px;
            background: var(--paper);
            border: 1px solid var(--line);
            border-radius: 999px;
        }
        .explorer-tab {
            appearance: none;
            border: 0;
            background: transparent;
            padding: 8px 18px;
            font-family: var(--font-body);
            font-size: 13.5px;
            font-weight: 500;
            color: var(--ink-soft);
            border-radius: 999px;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .explorer-tab:hover { color: var(--violet); }
        .explorer-tab.active {
            background: var(--violet);
            color: var(--cream);
            font-weight: 600;
        }
        .explorer-hint {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--muted);
        }
        .explorer-hint .pulse {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--amber);
            box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.6);
            animation: pulse 1.8s infinite;
        }
        @keyframes pulse {
            0%   { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.55); }
            70%  { box-shadow: 0 0 0 10px rgba(245, 158, 11, 0); }
            100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); }
        }

        .explorer {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            align-items: start;
        }
        @media (max-width: 900px) { .explorer { grid-template-columns: 1fr; } }

        .pane {
            border: 1px solid var(--line);
            border-radius: 14px;
            overflow: hidden;
            background: var(--paper);
        }
        .pane-head {
            padding: 12px 18px;
            font-family: var(--font-mono);
            font-size: 12.5px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--line);
            letter-spacing: 0.02em;
        }
        .pane.quone .pane-head {
            background: var(--code-bg);
            color: var(--cream);
            border-bottom-color: transparent;
        }
        .pane.r .pane-head {
            background: var(--cream);
            color: var(--ink-soft);
        }
        .pane-head .badge {
            font-family: var(--font-body);
            font-size: 10.5px;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 999px;
            text-transform: uppercase;
            letter-spacing: 0.09em;
        }
        .pane.quone .badge { background: var(--violet); color: var(--cream); }
        .pane.r .badge { background: #dbeafe; color: #1e40af; }

        .pane-body {
            font-family: var(--font-mono);
            font-size: 13px;
            line-height: 1.7;
        }
        .pane.quone .pane-body { background: var(--code-bg); color: var(--code-text); }
        .pane.r .pane-body { background: var(--paper); color: var(--ink); }

        .chunk {
            padding: 10px 18px;
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: background 0.15s ease, border-color 0.15s ease;
            position: relative;
        }
        .chunk:not(:last-child) {
            /* subtle inner rule */
        }
        .pane.quone .chunk:hover { background: rgba(109, 40, 217, 0.14); }
        .pane.r .chunk:hover { background: rgba(109, 40, 217, 0.06); }
        .chunk.active {
            border-left-color: var(--violet);
        }
        .pane.quone .chunk.active { background: rgba(109, 40, 217, 0.22); }
        .pane.r .chunk.active { background: rgba(245, 158, 11, 0.12); border-left-color: var(--amber); }
        .chunk.dimmed { opacity: 0.35; transition: opacity 0.15s ease; }
        .chunk:hover.dimmed { opacity: 1; }

        .chunk-line { display: block; white-space: pre; min-height: 1.7em; }

        .explanation {
            margin-top: 20px;
            padding: 22px 26px;
            background: var(--violet-soft);
            border: 1px solid rgba(109, 40, 217, 0.15);
            border-radius: 14px;
            display: flex;
            gap: 18px;
            align-items: flex-start;
        }
        .explanation-tag {
            flex: 0 0 auto;
            padding: 4px 10px;
            background: var(--violet);
            color: var(--cream);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            border-radius: 999px;
            font-family: var(--font-body);
        }
        .explanation-body {
            color: var(--ink);
            font-size: 15px;
            line-height: 1.6;
        }
        .explanation-body code {
            font-family: var(--font-mono);
            font-size: 13px;
            padding: 2px 6px;
            background: var(--paper);
            border: 1px solid rgba(109, 40, 217, 0.2);
            border-radius: 5px;
        }

        /* ---------- Install ---------- */
        .install {
            background: var(--ink);
            color: var(--cream);
            border-radius: 20px;
            padding: 64px 56px;
            position: relative;
            overflow: hidden;
        }
        .install::before {
            content: '';
            position: absolute;
            top: -100px;
            right: -100px;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--violet) 0%, transparent 65%);
            opacity: 0.4;
        }
        @media (max-width: 700px) { .install { padding: 44px 26px; } }
        .install-inner { position: relative; z-index: 1; max-width: 720px; }
        .install .section-eyebrow { color: var(--amber); }
        .install h2 {
            font-family: var(--font-display);
            font-size: clamp(26px, 3.4vw, 38px);
            font-weight: 700;
            line-height: 1.1;
            letter-spacing: -0.02em;
            margin-bottom: 14px;
        }
        .install h2 .accent { color: var(--amber); }
        .install p { color: rgba(232, 225, 214, 0.72); margin-bottom: 26px; max-width: 54ch; font-size: 16px; }
        .terminal {
            background: #0a0612;
            border: 1px solid rgba(232, 225, 214, 0.12);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 18px;
        }
        .terminal-head {
            padding: 10px 14px;
            border-bottom: 1px solid rgba(232, 225, 214, 0.08);
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .terminal-head .dot {
            width: 11px;
            height: 11px;
            border-radius: 50%;
            background: rgba(232, 225, 214, 0.15);
        }
        .terminal-body {
            padding: 16px 22px;
            font-family: var(--font-mono);
            font-size: 13.5px;
            line-height: 1.8;
        }
        .terminal-body .prompt { color: var(--violet); user-select: none; margin-right: 10px; }
        .terminal-body .cmd { color: var(--cream); }
        .terminal-body .out { color: rgba(232, 225, 214, 0.55); display: block; }

        /* ---------- Quote ---------- */
        .quote {
            font-family: var(--font-display);
            font-weight: 500;
            font-size: 19px;
            color: var(--ink);
            line-height: 1.5;
            padding: 22px 26px;
            border-left: 3px solid var(--amber);
            background: var(--amber-soft);
            border-radius: 0 10px 10px 0;
            margin: 24px 0 8px;
        }
        .quote cite {
            display: block;
            margin-top: 10px;
            font-family: var(--font-body);
            font-size: 13px;
            font-style: normal;
            font-weight: 500;
            color: var(--muted);
        }

        /* ---------- Footer ---------- */
        footer {
            border-top: 1px solid var(--line);
            padding: 64px 0 40px;
            margin-top: 32px;
        }
        .footer-grid {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            gap: 44px;
            margin-bottom: 48px;
        }
        @media (max-width: 800px) { .footer-grid { grid-template-columns: 1fr 1fr; gap: 36px; } }
        .footer-about p {
            color: var(--ink-soft);
            margin-top: 14px;
            font-size: 14.5px;
            max-width: 40ch;
        }
        .footer-col h4 {
            font-family: var(--font-display);
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--ink);
            margin-bottom: 16px;
        }
        .footer-col ul { list-style: none; display: flex; flex-direction: column; gap: 9px; }
        .footer-col a {
            color: var(--ink-soft);
            font-size: 14.5px;
            transition: color 0.15s ease;
        }
        .footer-col a:hover { color: var(--violet); }
        .footer-col a.placeholder {
            color: var(--muted);
            cursor: help;
        }
        .footer-col a.placeholder::after {
            content: ' · soon';
            font-size: 10.5px;
            color: var(--amber);
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }
        .footer-bottom {
            padding-top: 28px;
            border-top: 1px solid var(--line);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 14px;
            font-size: 12.5px;
            color: var(--muted);
        }
        .footer-bottom a { color: var(--ink-soft); border-bottom: 1px solid transparent; }
        .footer-bottom a:hover { border-bottom-color: var(--violet); }

        /* ---------- Misc accents ---------- */
        .pill {
            display: inline-block;
            padding: 3px 10px;
            background: var(--violet-soft);
            color: var(--violet-dark);
            border-radius: 999px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.05em;
        }
        .arrow { display: inline-block; transition: transform 0.15s ease; }
        a:hover .arrow { transform: translateX(3px); }

        noscript {
            display: block;
            padding: 20px;
            background: var(--violet-soft);
            color: var(--violet-dark);
            text-align: center;
        }
    </style>
</head>
<body>
    <noscript>This page is built with Elm and requires JavaScript to render.</noscript>
    <div id="app"></div>

    <script src="main.js"></script>
    <script>
        var app = Elm.Main.init({ node: document.getElementById('app') });

        var nav = null;
        function onScroll() {
            if (!nav) nav = document.querySelector('.nav');
            if (!nav) return;
            if (window.scrollY > 8) nav.classList.add('scrolled');
            else nav.classList.remove('scrolled');
        }
        window.addEventListener('scroll', onScroll, { passive: true });
        requestAnimationFrame(onScroll);
    </script>
</body>
</html>
